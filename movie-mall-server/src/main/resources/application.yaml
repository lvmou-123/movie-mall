server:
  port: 8081
spring:
  application:
    name: movie-mall
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: ${DB_URL:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
  redis:
    host: ${REDIS_HOST:}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null
  rabbitmq:
    host: ${RABBITMQ_HOST:}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:}
    password: ${RABBITMQ_PASSWORD:}
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 3000
mybatis-plus:
  type-aliases-package: com.ticket.film.entity,com.ticket.order.entity,com.ticket.user.entity
logging:
  level:
    com.ticket: debug
  pattern:
    dateformat: mm:ss.SSS
